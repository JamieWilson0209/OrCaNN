# OrCaNN configuration - the single source of truth for a run.
# Edit values and run, e.g.:  orcann run_pipeline --config config.yaml
# Paths are relative to THIS file's directory (the workspace root), so the
# repo works wherever it is extracted; an absolute path is used as-is.
# null = unset / use the default; lists use [a, b].

# Workspace layout: where recordings live and where results are written
paths:
  raw: "data/raw"                      # recordings to process (.nd2 / .tif / .npy)
  pre_processed: "data/pre_processed"  # motion-corrected movies (motion_correction output, infer input)
  infer: "results/infer"               # cached probability maps (infer output, segment input)
  spatial: "results/spatial"           # segment output: <spatial>/<recording_id>/
  activity: "results/activity"         # activity output: <activity>/<recording_id>/ (calcium-format, analysis input)
  analysis: "results/analysis"         # analysis stage output (group figures + tables)

# Trained segmenter used by the spatial detection stages
models:
  spatial: "models/seg_final/segmenter.pt"  # trained segmenter (.pt)

# Recording-wide imaging metadata
imaging:
  frame_rate: 2.0     # recording frame rate in Hz
  indicator: "fluo4"  # calcium indicator; resolves a decay time when deconvolution.decay_time is null

# Spatial detection (segmentation) knobs - used by segment
spatial:
  threshold: 0.3         # soma-probability cut, ~0.5-0.6
  watershed: false       # split touching cells (false = connected components, which merge them)
  min_distance: 4        # min peak separation in px for watershed seeding
  min_area: 4            # drop detected regions smaller than this many px (0 disables)
  min_radius: 3.0        # or drop regions below this equivalent radius in px
  resize_to: 0           # force each frame to NxN when pixel size is unknown (0 = off)
  train_um_per_px: null  # override the model's recorded training pixel size (null = use model's)

# Baseline correction (dF/F0) - first half of the activity stage
baseline:
  method: "global_dff"   # direct | global_dff (per-trace rolling percentile) | local_background (tissue-masked)
  percentile: 8.0        # baseline percentile for global_dff
  window_fraction: 0.25  # rolling-baseline window as a fraction of trace length
  min_window: 50         # minimum rolling-baseline window (frames)
  max_window: 500        # maximum rolling-baseline window (frames)
  presmooth_sigma: 2.0   # Gaussian smoothing (frames) for F0 estimation only; lifts F0 to the true resting level on noisy traces; 0 = off

# Spike deconvolution (OASIS) - second half of the activity stage
deconvolution:
  enabled: true               # run OASIS spike inference (false = skip; analysis then has no spikes)
  method: "oasis"             # oasis (AR deconvolution) | threshold (peak detection) | robust (deterministic transient detector)
  decay_time: null            # indicator decay time in s (null = resolve from imaging.indicator)
  optimize_g: true            # let OASIS fit the AR coefficient from data
  penalty: 0.0                # L1 sparsity penalty; 0 = auto-tune (recommended for OASIS)
  noise_method: "mean"        # OASIS noise estimator: mean | median | logmexp
  s_min: 0.1                  # min spike amplitude in dF/F0; OASIS discards events below this (0 = let OASIS decide)
  noise_gate_sigma: 3.5       # keep only spikes exceeding this multiple of the trace noise floor (0 = no gate)
  robust_safety_net: false     # on the oasis path, backfill clear transients OASIS missed (true recommended)
  robust_k_onset: 3.0         # robust detector: event onset threshold as a multiple of noise
  robust_k_peak: 5.0          # robust detector: required peak height as a multiple of noise (main precision knob)
  robust_min_duration_s: 0.5  # robust detector: minimum event duration in seconds (rejects single-sample noise)

# Motion correction (caiman env) - motion_correction stage
motion_correction:
  mode: "auto"   # rigid | piecewise_rigid | auto
  max_shift: 20  # maximum shift in px

# Spatial QC figure written by segment
figures:
  enabled: true  # write the spatial QC overlay in segment

# Per-recording HTML galleries written by the activity stage
gallery:
  interactive: true   # per-recording interactive HTML gallery (gallery.html)
  movie: false        # full-movie HTML viewer (large file; off by default)
  movie_subsample: 1  # keep every Nth frame in the movie gallery
  max_rois: 500       # cap the number of ROIs drawn in the gallery

# train_spatial - fit the segmenter
train_spatial:
  movies: "data/annotated/movies"              # dir of training movies (<stem>.tif)
  masks: "data/annotated/masks"                # dir of instance-label masks (<stem>.npy) or ImageJ ROI sets
  out: "models/seg_final"                      # output dir for the trained segmenter.pt
  report: "results/spatial_eval/report.json"   # optional JSON metrics path (null to skip)
  channels: ["structural", "max", "variance"]  # energy channels: any of structural, max, variance, correlation
  radii: [3.0, 3.7, 4.5, 5.5, 6.7, 8.2, 10.0]  # LoG scale bank, cell radii in px
  min_cell_area: 0                             # strip ROIs smaller than this from training masks (0 = keep all)
  pixel_um: null                               # training movies' um/px, recorded in the model (null if unknown)
  patch: 128                                   # training patch size in px
  epochs: 30                                   # training epochs
  val_frac: 0.2                                # fraction of recordings held out for validation
  holdout: true                                # hold out val_frac to evaluate; false = train final model on all data

# Group analysis - cross-recording statistics + genotype/day figures
analysis:
  mutant_label: "CEP41 R242H"     # legend label for the non-control genotype
  min_roi_distance: 5.0          # dedupe ROIs whose centroids are closer than this (px)
  motion_max_threshold: 15.0      # QC: max motion shift (px) tolerated per recording
  motion_residual_threshold: 2.0  # QC: residual motion (px) tolerated per recording
  drift_threshold: 1.0            # QC: baseline drift tolerated per recording
  roi_peak_figures: false         # also render per-ROI peak montages (slow)
  inactive_file: null             # text file of recording ids to mark inactive (one per line)
